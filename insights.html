<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boundly — AI Chat</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* ── Chat Layout ────────────────────────────────────── */
        .chat-wrap {
            display: flex;
            flex-direction: column;
            height: 520px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }

        /* Messages area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 99px;
        }

        /* Message bubbles */
        .msg {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeUp 0.2s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg.ai {
            align-self: flex-start;
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg.user .msg-avatar {
            background: var(--accent);
            color: #0d0f14;
        }

        .msg.ai .msg-avatar {
            background: var(--surface2);
            border: 1px solid var(--border2);
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .msg.user .msg-bubble {
            background: var(--accent);
            color: #0d0f14;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .msg.ai .msg-bubble {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* Typing indicator */
        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 4px 0;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--muted);
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            40% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Input bar */
        .chat-input-bar {
            display: flex;
            gap: 8px;
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .chat-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 99px;
            padding: 10px 18px;
            font-family: var(--font-main);
            font-size: 0.9rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .chat-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.1);
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .chat-send {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.15s;
        }

        .chat-send:hover {
            opacity: 0.88;
            transform: scale(1.05);
        }

        .chat-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Quick prompts */
        .quick-prompts {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .quick-btn {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 99px;
            padding: 6px 14px;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-main);
        }

        .quick-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* API key notice */
        .api-notice {
            background: var(--info-bg);
            border: 1px solid rgba(96, 165, 250, 0.25);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 0.8rem;
            color: var(--info);
            margin-bottom: 12px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <h1>Boundly 💸</h1>
            <p class="tagline" id="header-tagline">Know your limits. Own your choices.</p>
        </header>

        <nav class="nav">
            <a href="landing.html?view=landing">Home</a>
            <a href="index.html">Analyze</a>
            <a href="budget-tracker.html">Budget Tracker</a>
            <a href="insights.html" class="active">AI Chat</a>
        </nav>

        <!-- API key notice -->
        <div class="api-notice" id="api-notice">
            💡 AI Chat uses the OpenRouter API. Add your key in <code>insights.html</code> to enable real AI responses.
        </div>

        <!-- Quick prompts -->
        <div class="quick-prompts">
            <button class="quick-btn" onclick="sendQuick('Can I afford to go out this week?')">Can I afford to go out?
                🤔</button>
            <button class="quick-btn" onclick="sendQuick('What is my biggest spending category this month?')">Top
                spending category 📊</button>
            <button class="quick-btn" onclick="sendQuick('Give me tips to save more money this week.')">Save more tips
                💡</button>
            <button class="quick-btn" onclick="sendQuick('How is my budget health score calculated?')">How is my score
                calculated? 🎯</button>
        </div>

        <!-- Chat window -->
        <div class="chat-wrap">
            <div class="chat-messages" id="chat-messages">
                <!-- Welcome message injected by JS -->
            </div>
            <div class="chat-input-bar">
                <input type="text" class="chat-input" id="chat-input" placeholder="Ask me anything about your budget..."
                    autocomplete="off" />
                <button class="chat-send" id="chat-send" title="Send">➤</button>
            </div>
        </div>

    </div>

    <script>
        // ── Config ────────────────────────────────────────────
        // Get your free API key at https://openrouter.ai
        const OPENROUTER_API_KEY = "YOUR_OPENROUTER_API_KEY_HERE";
        const MODEL = "mistralai/mistral-7b-instruct";

        // ── Storage ───────────────────────────────────────────
        const BUDGET_KEY = "boundly_budget";
        const SPENDING_KEY = "boundly_spendings";
        const FOMO_KEY = "boundly_fomo";

        function loadBudget() { try { return JSON.parse(localStorage.getItem(BUDGET_KEY)); } catch { return null; } }
        function loadSpendings() { try { return JSON.parse(localStorage.getItem(SPENDING_KEY)) || []; } catch { return []; } }
        function getFomo() { return parseInt(localStorage.getItem(FOMO_KEY) || "0"); }

        function getThisMonthSpendings() {
            const now = new Date();
            return loadSpendings().filter(s => {
                const d = new Date(s.date);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
        }

        // ── Build financial context for AI ────────────────────
        function buildContext() {
            const budget = loadBudget();
            const monthly = getThisMonthSpendings();
            const spent = monthly.reduce((s, x) => s + x.amount, 0);
            const fomo = getFomo();

            if (!budget) return "The user hasn't set up their budget yet.";

            const byCategory = {};
            monthly.forEach(s => { byCategory[s.category] = (byCategory[s.category] || 0) + s.amount; });
            const catSummary = Object.entries(byCategory)
                .sort((a, b) => b[1] - a[1])
                .map(([c, a]) => `${c}: $${a.toFixed(2)}`)
                .join(", ") || "none yet";

            return `
User financial profile:
- Name: ${budget.name || "User"}
- Monthly income: $${budget.income}
- Essential expenses: $${budget.expenses}
- Savings target: $${budget.savings}
- Monthly fun budget: $${budget.monthlyFunBudget.toFixed(2)}
- Weekly fun budget: $${budget.weeklyFunBudget.toFixed(2)}
- Spent this month: $${spent.toFixed(2)}
- Remaining fun budget: $${Math.max(0, budget.monthlyFunBudget - spent).toFixed(2)}
- Spending by category: ${catSummary}
- FOMO score (hangouts skipped): ${fomo}
      `.trim();
        }

        // ── Conversation history ──────────────────────────────
        const SYSTEM_PROMPT = `You are Boundly AI, a friendly and supportive financial advisor for young people and college students. You help users understand their spending habits, make smart social decisions, and stay on budget — without being judgmental.

Always keep responses concise (2-4 sentences max unless the user asks for detail). Be warm, encouraging, and practical. Use the user's financial data to give personalized advice.`;

        let messages = [];

        // ── DOM ───────────────────────────────────────────────
        const messagesEl = document.getElementById("chat-messages");
        const inputEl = document.getElementById("chat-input");
        const sendBtn = document.getElementById("chat-send");

        // ── Personalize header ────────────────────────────────
        const profile = loadBudget();
        if (profile?.name) {
            document.getElementById("header-tagline").textContent =
                `Hey ${profile.name} 👋 — ask me anything about your budget.`;
        }

        // Show API notice if key not set
        if (OPENROUTER_API_KEY === "YOUR_OPENROUTER_API_KEY_HERE") {
            document.getElementById("api-notice").style.display = "block";
        }

        // ── Render message bubble ─────────────────────────────
        function addMessage(role, text) {
            const wrap = document.createElement("div");
            wrap.className = `msg ${role}`;

            const avatar = document.createElement("div");
            avatar.className = "msg-avatar";
            avatar.textContent = role === "user" ? "👤" : "🤖";

            const bubble = document.createElement("div");
            bubble.className = "msg-bubble";
            bubble.textContent = text;

            wrap.appendChild(avatar);
            wrap.appendChild(bubble);
            messagesEl.appendChild(wrap);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return wrap;
        }

        // ── Typing indicator ──────────────────────────────────
        function showTyping() {
            const wrap = document.createElement("div");
            wrap.className = "msg ai";
            wrap.id = "typing-indicator";
            wrap.innerHTML = `
        <div class="msg-avatar">🤖</div>
        <div class="msg-bubble">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>
      `;
            messagesEl.appendChild(wrap);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function hideTyping() {
            document.getElementById("typing-indicator")?.remove();
        }

        // ── Call AI ───────────────────────────────────────────
        async function callAI(userMessage) {
            // Add context as system-level info on first message
            const contextNote = buildContext();
            messages.push({ role: "user", content: userMessage });

            // If no API key, use smart local fallback
            if (OPENROUTER_API_KEY === "YOUR_OPENROUTER_API_KEY_HERE") {
                return getLocalFallback(userMessage);
            }

            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [
                        { role: "system", content: `${SYSTEM_PROMPT}\n\n${contextNote}` },
                        ...messages
                    ],
                    max_tokens: 300,
                    temperature: 0.7,
                }),
            });

            if (!response.ok) throw new Error(`API error ${response.status}`);

            const data = await response.json();
            const reply = data?.choices?.[0]?.message?.content?.trim();
            if (!reply) throw new Error("Empty response");

            messages.push({ role: "assistant", content: reply });
            return reply;
        }

        // ── Local fallback (no API key) ───────────────────────
        function getLocalFallback(msg) {
            const lower = msg.toLowerCase();
            const budget = loadBudget();
            const monthly = getThisMonthSpendings();
            const spent = monthly.reduce((s, x) => s + x.amount, 0);
            const fomo = getFomo();

            if (!budget) return "You haven't set up your budget yet! Head to Budget Tracker to get started.";

            const remaining = Math.max(0, budget.monthlyFunBudget - spent);
            const pct = Math.round((spent / budget.monthlyFunBudget) * 100);

            if (lower.includes("afford") || lower.includes("go out") || lower.includes("this week")) {
                const weekly = budget.weeklyFunBudget;
                return weekly > 20
                    ? `Based on your budget, you have $${weekly.toFixed(2)} for fun this week. You can likely afford a low-to-medium cost outing — just use Analyze first to double-check! 🟢`
                    : `Your weekly fun budget is $${weekly.toFixed(2)}, which is pretty tight. Consider a free or low-cost hangout this week. 🟡`;
            }

            if (lower.includes("biggest") || lower.includes("top") || lower.includes("category") || lower.includes("most")) {
                const byCategory = {};
                monthly.forEach(s => { byCategory[s.category] = (byCategory[s.category] || 0) + s.amount; });
                const sorted = Object.entries(byCategory).sort((a, b) => b[1] - a[1]);
                if (sorted.length === 0) return "You haven't logged any spending this month yet! Use the Analyze tab to get started.";
                return `Your biggest spending category this month is **${sorted[0][0]}** at $${sorted[0][1].toFixed(2)}. ${sorted.length > 1 ? `Followed by ${sorted[1][0]} at $${sorted[1][1].toFixed(2)}.` : ""} 📊`;
            }

            if (lower.includes("save") || lower.includes("tip") || lower.includes("advice")) {
                return `You've used ${pct}% of your monthly fun budget with $${remaining.toFixed(2)} remaining. ${pct > 70 ? "Try to stick to free or low-cost activities for the rest of the month!" : "You're doing well — keep logging your spending to stay on track!"} 💡`;
            }

            if (lower.includes("score") || lower.includes("health") || lower.includes("calculated")) {
                return `Your Budget Health Score is based on 3 factors: how much of your fun budget remains (50pts), your savings discipline (30pts), and a small deduction for your FOMO score (up to -20pts). Higher = healthier! 🎯`;
            }

            if (lower.includes("fomo")) {
                return fomo === 0
                    ? "Your FOMO Score is 0 — you haven't skipped any hangouts yet! When you choose 'I'm Out' in Analyze, your FOMO Score goes up. 🙈"
                    : `Your FOMO Score is ${fomo}. That means you've protected your budget ${fomo} time${fomo > 1 ? "s" : ""} by saying no. Your wallet is proud. 💪`;
            }

            if (lower.includes("budget") || lower.includes("remaining") || lower.includes("left")) {
                return `You have $${remaining.toFixed(2)} left in your monthly fun budget (${100 - pct}% remaining). Your weekly fun budget is $${budget.weeklyFunBudget.toFixed(2)}. 💰`;
            }

            return `I'm your Boundly AI advisor! You can ask me about your spending, whether you can afford something, tips to save, or how your budget health score works. (Add an OpenRouter API key to get smarter responses!) 🤖`;
        }

        // ── Send message ──────────────────────────────────────
        async function sendMessage(text) {
            const msg = (text || inputEl.value).trim();
            if (!msg) return;

            inputEl.value = "";
            sendBtn.disabled = true;
            inputEl.disabled = true;

            addMessage("user", msg);
            showTyping();

            try {
                const reply = await callAI(msg);
                hideTyping();
                addMessage("ai", reply);
            } catch (err) {
                hideTyping();
                addMessage("ai", "Sorry, I ran into an issue. Please check your API key or try again. 🔧");
                console.error("AI error:", err);
            }

            sendBtn.disabled = false;
            inputEl.disabled = false;
            inputEl.focus();
        }

        function sendQuick(text) { sendMessage(text); }

        // ── Event listeners ───────────────────────────────────
        sendBtn.addEventListener("click", () => sendMessage());
        inputEl.addEventListener("keydown", e => {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        // ── Welcome message ───────────────────────────────────
        const name = loadBudget()?.name;
        addMessage("ai", `Hey${name ? ` ${name}` : ""}! 👋 I'm your Boundly AI advisor. Ask me anything about your budget, spending habits, or whether you can afford that hangout. What's on your mind?`);
    </script>

</body>

</html>
