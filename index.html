<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boundly — Analyze</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="container">

        <header>
            <h1>Boundly 💸</h1>
            <p class="tagline" id="header-tagline">Know your limits. Own your choices.</p>
        </header>

        <nav class="nav">
            <a href="landing.html?view=landing">Home</a>
            <a href="index.html" class="active">Analyze</a>
            <a href="budget-tracker.html">Budget Tracker</a>
            <a href="ai-chat.html">AI Chat</a>
        </nav>

        <!-- ── Section 1: Financial Profile ─────────────────────── -->
        <section class="section">
            <h2>💼 Financial Profile</h2>

            <div class="input-group">
                <label for="income">Monthly Income ($)</label>
                <input type="number" id="income" placeholder="e.g. 3000" min="0" />
            </div>

            <div class="input-group">
                <label for="expenses">Essential Monthly Expenses ($)</label>
                <input type="number" id="expenses" placeholder="e.g. 2000" min="0" />
            </div>

            <div class="input-group">
                <label for="savings">Monthly Savings Target ($)</label>
                <input type="number" id="savings" placeholder="e.g. 300" min="0" />
            </div>
        </section>

        <!-- ── Section 2: Social Invitation ──────────────────────── -->
        <section class="section">
            <h2>📩 Social Invitation</h2>

            <div class="input-group">
                <label for="inviteText">Paste the hangout invitation</label>
                <textarea id="inviteText" rows="4" placeholder="Paste a hangout invitation here..."></textarea>
                <small class="helper-text">
                    Example: "Let's grab dinner at Cheesecake Factory tonight"
                </small>
            </div>

            <button id="analyzeBtn">Analyze 🔍</button>
        </section>

        <!-- ── Section 3: Analysis Result ────────────────────────── -->
        <section class="section">
            <h2>📊 Analysis Result</h2>
            <div id="result"></div>
        </section>

    </div>

    <!-- Auto-fill budget from onboarding profile -->
    <script>
        const BUDGET_KEY = "boundly_budget";

        // If no budget saved, redirect to landing/onboarding
        const saved = localStorage.getItem(BUDGET_KEY);
        if (!saved) {
            window.location.href = "landing.html";
        } else {
            try {
                const profile = JSON.parse(saved);

                // Personalize header
                if (profile.name) {
                    document.getElementById("header-tagline").textContent =
                        `Hey ${profile.name} 👋 — know your limits, own your choices.`;
                }

                // Auto-fill inputs
                if (profile.income) document.getElementById("income").value = profile.income;
                if (profile.expenses) document.getElementById("expenses").value = profile.expenses;
                if (profile.savings) document.getElementById("savings").value = profile.savings;

            } catch (e) {
                console.warn("Boundly: could not parse saved profile.");
            }
        }
    </script>

    <script type="module" src="app.js"></script>

</body>

</html>
