<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boundly — AI Chat</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        /* ── Chat Layout ────────────────────────────────────── */
        .chat-container {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            height: 550px;
            display: flex;
            flex-direction: column;
        }

        /* Empty State Overlay */
        .chat-empty-state {
            position: absolute;
            inset: 0;
            background: var(--surface);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            animation: fadeIn 0.3s ease;
        }

        .chat-empty-state.active {
            display: flex;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .empty-title {
            font-family: var(--font-head);
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: var(--text);
        }

        .empty-text {
            color: var(--muted);
            font-size: 0.95rem;
            max-width: 300px;
            margin-bottom: 24px;
        }

        .setup-btn {
            background: var(--accent);
            color: #0d0f14;
            padding: 12px 24px;
            border-radius: 99px;
            text-decoration: none;
            font-weight: 700;
            transition: opacity 0.2s;
        }

        .setup-btn:hover { opacity: 0.85; }

        /* Messages area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 99px;
        }

        /* Message bubbles */
        .msg {
            display: flex;
            gap: 12px;
            max-width: 85%;
            opacity: 0;
            transform: translateY(10px);
            animation: msgShow 0.3s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes msgShow {
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg.ai { align-self: flex-start; }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .msg.user .msg-avatar { background: var(--accent); color: #0d0f14; }
        .msg.ai .msg-avatar { 
            background: var(--surface2); 
            border: 1px solid var(--border2); 
            color: var(--accent);
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.925rem;
            line-height: 1.55;
            position: relative;
        }

        .msg.user .msg-bubble {
            background: var(--accent);
            color: #0d0f14;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .msg.ai .msg-bubble {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.3;
            animation: typingBounce 1.2s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(1); opacity: 0.3; }
            40% { transform: scale(1.3); opacity: 1; }
        }

        /* Input bar */
        .chat-input-bar {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .chat-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 99px;
            padding: 12px 20px;
            color: var(--text);
            font-family: var(--font-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        .chat-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.1);
            background: var(--surface);
        }

        .send-btn {
            width: 46px;
            height: 46px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            color: #0d0f14;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }

        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* Quick Prompts Scroll */
        .quick-actions {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 4px 0 16px;
            margin-bottom: 8px;
            mask-image: linear-gradient(to right, black 85%, transparent);
        }

        .quick-actions::-webkit-scrollbar { display: none; }

        .action-chip {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

    </style>
    </style>
</head>

<body>

    <div class="container">

        <header>
            <h1>Boundly 💸</h1>
            <p class="tagline" id="header-tagline">Know your limits. Own your choices.</p>
        </header>

        <nav class="nav">
            <a href="landing.html?view=landing">Home</a>
            <a href="index.html">Analyze</a>
            <a href="budget-tracker.html">Budget Tracker</a>
            <a href="ai-chat.html" class="active">AI Chat</a>
        </nav>



        <!-- Quick Prompts Hub -->
        <div class="quick-actions" id="quick-actions">
            <div class="action-chip" onclick="sendQuick('Can I afford to go out this week?')">Afford to go out? 🤔</div>
            <div class="action-chip" onclick="sendQuick('What is my biggest spending category this month?')">Top category 📈</div>
            <div class="action-chip" onclick="sendQuick('Give me 3 tips to save $50 this week.')">Quick savings tips 💡</div>
            <div class="action-chip" onclick="sendQuick('How much fun money is left exactly?')">Money left? 💰</div>
            <div class="action-chip" onclick="sendQuick('What was my last purchase?')">Last purchase? 🕒</div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-container">


            <!-- Empty State -->
            <div class="chat-empty-state" id="chat-empty">
                <div class="empty-icon">💸</div>
                <h3 class="empty-title">Let's set your budget</h3>
                <p class="empty-text">Boundly AI needs your budget data to give you personalized financial advice.</p>
                <a href="budget-tracker.html" class="setup-btn">Set Up Budget →</a>
            </div>

            <!-- Messages -->
            <div class="chat-messages" id="chat-messages">
                <!-- Messages JS injected -->
            </div>

            <!-- Input Bar -->
            <div class="chat-input-bar">
                <div class="input-wrapper">
                    <input type="text" id="chat-input" class="chat-input" placeholder="Ask Boundly anything..." autocomplete="off">
                </div>
                <button id="chat-send" class="send-btn" title="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>

    </div>

    <script>
        // ── Config ────────────────────────────────────────────
        // Get your free API key at https://openrouter.ai
        const OPENROUTER_API_KEY = "YOUR_OPENROUTER_API_KEY_HERE";
        const MODEL = "mistralai/mistral-7b-instruct";

        // ── Storage Keys ──────────────────────────────────────
        const BUDGET_KEY = "boundly_budget";
        const SPENDING_KEY = "boundly_spendings";
        const FOMO_KEY = "boundly_fomo";

        // ── State ─────────────────────────────────────────────
        let messages = [];
        let isSimulation = OPENROUTER_API_KEY === "YOUR_OPENROUTER_API_KEY_HERE";

        // ── DOM ───────────────────────────────────────────────
        const messagesEl = document.getElementById("chat-messages");
        const inputEl = document.getElementById("chat-input");
        const sendBtn = document.getElementById("chat-send");
        const emptyState = document.getElementById("chat-empty");

        // ── Helpers ───────────────────────────────────────────
        function loadBudget() { try { return JSON.parse(localStorage.getItem(BUDGET_KEY)); } catch { return null; } }
        function loadSpendings() { try { return JSON.parse(localStorage.getItem(SPENDING_KEY)) || []; } catch { return []; } }
        function getFomo() { return parseInt(localStorage.getItem(FOMO_KEY) || "0"); }

        function checkBudgetContext() {
            const budget = loadBudget();
            if (!budget) {
                emptyState.classList.add("active");
                return false;
            }
            emptyState.classList.remove("active");
            return true;
        }

        // ── Build context for AI ──────────────────────────────
        function buildContext() {
            const budget = loadBudget();
            const spendings = loadSpendings();
            const now = new Date();
            const monthSpend = spendings.filter(s => {
                const d = new Date(s.date);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
            const spent = monthSpend.reduce((acc, s) => acc + s.amount, 0);
            const remaining = Math.max(0, budget.monthlyFunBudget - spent);
            
            return {
                name: budget.name || "User",
                income: budget.income,
                expenses: budget.expenses,
                savings: budget.savings,
                funBudget: budget.monthlyFunBudget,
                weeklyFun: budget.weeklyFunBudget,
                spent: spent,
                remaining: remaining,
                fomo: getFomo(),
                lastSpend: spendings.length > 0 ? spendings[spendings.length - 1] : null
            };
        }

        // ── Chat UI ───────────────────────────────────────────
        function addMessage(role, text) {
            const wrap = document.createElement("div");
            wrap.className = `msg ${role}`;
            
            const avatar = document.createElement("div");
            avatar.className = "msg-avatar";
            avatar.textContent = role === "user" ? "👤" : "🤖";

            const bubble = document.createElement("div");
            bubble.className = "msg-bubble";
            bubble.innerHTML = text.replace(/\n/g, "<br>");

            wrap.appendChild(avatar);
            wrap.appendChild(bubble);
            messagesEl.appendChild(wrap);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function showTyping() {
            const wrap = document.createElement("div");
            wrap.className = "msg ai";
            wrap.id = "typing-msg";
            wrap.innerHTML = `
                <div class="msg-avatar">🤖</div>
                <div class="msg-bubble">
                    <div class="typing-indicator"><span></span><span></span><span></span></div>
                </div>
            `;
            messagesEl.appendChild(wrap);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function hideTyping() {
            document.getElementById("typing-msg")?.remove();
        }

        // ── AI Bridge ─────────────────────────────────────────
        async function getAIResponse(userMsg) {
            const context = buildContext();
            
            if (isSimulation) {
                return new Promise(resolve => {
                    setTimeout(() => resolve(getLocalFallback(userMsg, context)), 800);
                });
            }

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: "system", content: `You are Boundly AI, a supportive financial advisor. Context: User=${context.name}, MonthlyFunBudget=$${context.funBudget}, WeeklyFun=$${context.weeklyFun}, SpentThisMonth=$${context.spent}, Remaining=$${context.remaining}, FOMO=${context.fomo}. Keep it 2-3 sentences.` },
                            { role: "user", content: userMsg }
                        ],
                    }),
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (err) {
                console.error("AI Error:", err);
                return "I'm having trouble connecting to the real AI. Let me give you a simulated answer instead: " + getLocalFallback(userMsg, context);
            }
        }

        // ── Intelligent Fallback ──────────────────────────────
        function getLocalFallback(msg, ctx) {
            const q = msg.toLowerCase();
            
            if (q.includes("afford") || q.includes("go out")) {
                if (ctx.remaining <= 0) return `Oof, looks like your fun budget is empty for the month. I'd recommend sitting this one out or finding a free activity! 🛑`;
                if (ctx.remaining < 20) return `You only have $${ctx.remaining.toFixed(2)} left for the month. It's risky — maybe suggest a park hangout instead? 🟡`;
                return `You've got $${ctx.remaining.toFixed(2)} left in your fun budget. As long as it's under $${ctx.weeklyFun.toFixed(2)}, you're golden! ✅`;
            }

            if (q.includes("tips") || q.includes("save")) {
                return `1. Try a "No Spend" weekend. 2. Invite friends over instead of going out. 3. Look for happy hour deals! You're currently using ${Math.round((ctx.spent/ctx.funBudget)*100)}% of your fun budget. 💡`;
            }

            if (q.includes("category") || q.includes("where")) {
                return `You've spent $${ctx.spent.toFixed(2)} total this month. Check your 'Analyze' tab to see which venues are hitting your wallet hardest! 📊`;
            }

            if (q.includes("left") || q.includes("budget") || q.includes("money")) {
                return `You have $${ctx.remaining.toFixed(2)} left for the month. That's about $${ctx.weeklyFun.toFixed(2)} per week if you want to pace yourself! 💰`;
            }

            if (q.includes("purchase") || q.includes("buy") || q.includes("last")) {
                if (!ctx.lastSpend) return "You haven't logged any purchases yet! Start tracking to see them here. 🕒";
                return `Your last purchase was "${ctx.lastSpend.label}" for $${ctx.lastSpend.amount.toFixed(2)}. Do you want to know how that affected your overall budget?`;
            }

            return `I'm here to help, ${ctx.name}! Ask me if you can afford an outing, how much money you have left, or for some quick savings tips. 🤖`;
        }

        // ── Main Controller ───────────────────────────────────
        async function sendMessage(text) {
            const msg = (text || inputEl.value).trim();
            if (!msg) return;

            inputEl.value = "";
            sendBtn.disabled = true;
            addMessage("user", msg);
            showTyping();

            const response = await getAIResponse(msg);
            hideTyping();
            addMessage("ai", response);
            sendBtn.disabled = false;
        }

        function sendQuick(text) { sendMessage(text); }

        // ── Init ──────────────────────────────────────────────
        window.onload = () => {
            if (checkBudgetContext()) {
                const ctx = buildContext();
                // Simulation banner removed per user request
                
                addMessage("ai", `Hey ${ctx.name}! 👋 I'm your Boundly AI advisor. I see you have $${ctx.remaining.toFixed(2)} left in your fun budget. What's on your mind?`);
            }
        };

        sendBtn.onclick = () => sendMessage();
        inputEl.onkeydown = e => { if (e.key === "Enter") sendMessage(); };
    </script>

</body>

</html>
